name: Bug Report
description: Something is broken.
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much as you can — the more detail, the faster we can fix it.
  - type: input
    id: version
    attributes:
      label: ToTidal version
      description: Output of `totidal --version`.
      placeholder: "1.0.7"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows 11
        - Windows 10
        - Linux
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python3 --version`.
      placeholder: "3.12.4"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact CLI command or GUI action. Paste full traceback in a code block.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behaviour
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Redacted config (optional)
      description: Paste `config.yml` with `client_secret`, tokens, and AI keys stripped.
      render: yaml
